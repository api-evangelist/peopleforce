naftiko: 1.0.0-alpha2
info:
  label: PeopleForce API — Divisions
  description: 'PeopleForce API — Divisions. 1 operations. Lead operation: List divisions. Self-contained Naftiko capability
    covering one Peopleforce business surface.'
  tags:
  - Peopleforce
  - Divisions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PEOPLEFORCE_API_KEY: PEOPLEFORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: peopleforce-divisions
    baseUri: https://app.peopleforce.io/api/public/v2
    description: PeopleForce API — Divisions business capability. Self-contained, no shared references.
    resources:
    - name: divisions
      path: /divisions
      operations:
      - name: get
        method: GET
        description: List divisions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PEOPLEFORCE_API_KEY}}'
  exposes:
  - type: rest
    namespace: peopleforce-divisions-rest
    port: 8080
    description: REST adapter for PeopleForce API — Divisions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/divisions
      name: divisions
      description: REST surface for divisions.
      operations:
      - method: GET
        name: get
        description: List divisions
        call: peopleforce-divisions.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: peopleforce-divisions-mcp
    port: 9090
    transport: http
    description: MCP adapter for PeopleForce API — Divisions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-divisions
      description: List divisions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: peopleforce-divisions.get
      outputParameters:
      - type: object
        mapping: $.
