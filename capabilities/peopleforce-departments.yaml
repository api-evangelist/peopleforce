naftiko: 1.0.0-alpha2
info:
  label: PeopleForce API — Departments
  description: 'PeopleForce API — Departments. 1 operations. Lead operation: List departments. Self-contained Naftiko capability
    covering one Peopleforce business surface.'
  tags:
  - Peopleforce
  - Departments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PEOPLEFORCE_API_KEY: PEOPLEFORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: peopleforce-departments
    baseUri: https://app.peopleforce.io/api/public/v2
    description: PeopleForce API — Departments business capability. Self-contained, no shared references.
    resources:
    - name: departments
      path: /departments
      operations:
      - name: get
        method: GET
        description: List departments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PEOPLEFORCE_API_KEY}}'
  exposes:
  - type: rest
    namespace: peopleforce-departments-rest
    port: 8080
    description: REST adapter for PeopleForce API — Departments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/departments
      name: departments
      description: REST surface for departments.
      operations:
      - method: GET
        name: get
        description: List departments
        call: peopleforce-departments.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: peopleforce-departments-mcp
    port: 9090
    transport: http
    description: MCP adapter for PeopleForce API — Departments. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-departments
      description: List departments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: peopleforce-departments.get
      outputParameters:
      - type: object
        mapping: $.
