naftiko: 1.0.0-alpha2
info:
  label: PeopleForce API — Positions
  description: 'PeopleForce API — Positions. 1 operations. Lead operation: List positions. Self-contained Naftiko capability
    covering one Peopleforce business surface.'
  tags:
  - Peopleforce
  - Positions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PEOPLEFORCE_API_KEY: PEOPLEFORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: peopleforce-positions
    baseUri: https://app.peopleforce.io/api/public/v2
    description: PeopleForce API — Positions business capability. Self-contained, no shared references.
    resources:
    - name: positions
      path: /positions
      operations:
      - name: get
        method: GET
        description: List positions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PEOPLEFORCE_API_KEY}}'
  exposes:
  - type: rest
    namespace: peopleforce-positions-rest
    port: 8080
    description: REST adapter for PeopleForce API — Positions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/positions
      name: positions
      description: REST surface for positions.
      operations:
      - method: GET
        name: get
        description: List positions
        call: peopleforce-positions.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: peopleforce-positions-mcp
    port: 9090
    transport: http
    description: MCP adapter for PeopleForce API — Positions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-positions
      description: List positions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: peopleforce-positions.get
      outputParameters:
      - type: object
        mapping: $.
