      token: '{{PEOPLEFORCE_TOKEN}}'
    resources:
    - name: employees
      path: /employees
      operations:
      - name: get-employees
        method: GET
        description: List employees
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: per_page
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post-employees
        method: POST
        description: Create an employee
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
