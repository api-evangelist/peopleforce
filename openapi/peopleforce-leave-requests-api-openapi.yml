openapi: 3.0.3
info:
  title: PeopleForce Candidates Leave Requests API
  description: PeopleForce is an HR platform offering a REST API for managing employees, candidates, leave requests, departments, divisions, positions, and other HR-related entities.
  version: v2
  contact:
    name: PeopleForce Support
    url: https://developer.peopleforce.io/docs/getting-started
servers:
- url: https://app.peopleforce.io/api/public/v2
  description: PeopleForce production API
security:
- BearerAuth: []
tags:
- name: Leave Requests
  description: Time off and leave management.
paths:
  /leave_requests:
    get:
      tags:
      - Leave Requests
      summary: List leave requests
      responses:
        '200':
          description: A list of leave requests.
    post:
      tags:
      - Leave Requests
      summary: Create a leave request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: The created leave request.
  /leave_requests/{id}:
    get:
      tags:
      - Leave Requests
      summary: Get a leave request
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: A leave request record.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
